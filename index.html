<!DOCTYPE HTML>

<html>
	<head>
		<title>Sergei Liski</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--[if lte IE 8]><script src="assets/js/html5shiv.js"></script><![endif]-->
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="assets/css/custom.css" />
		<!--[if lte IE 9]><link rel="stylesheet" href="assets/css/ie9.css" /><![endif]-->
		<!--[if lte IE 8]><link rel="stylesheet" href="assets/css/ie8.css" /><![endif]-->
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-loading">

			<div id="wrapper">
				<div id="particles-js"></div>
				<!-- Main -->
					<section id="main">
						<header>
							<span class="avatar">
									<svg width="200" height="200">
									
											<filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
													<feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
													<feOffset in="blur" dx="2.5" dy="2.5"/>
											</filter>
									
											<g>
													<circle id="shadow" style="fill:rgba(0,0,0,0.1)" cx="97" cy="100" r="87" filter="url(#innerShadow)"></circle>
													<circle id="circle" style="stroke: #FFF; stroke-width: 12px; fill:#212121" cx="100" cy="100" r="80"></circle>
											</g>
											<g>
													<line x1="100" y1="100" x2="100" y2="55" transform="rotate(80 100 100)" style="stroke-width: 3px; stroke: #FFF;" id="hourhand">
															<animatetransform attributeName="transform"
																								attributeType="XML"
																								type="rotate"
																								dur="43200s"
																								repeatCount="indefinite"/>
													</line>
													<line x1="100" y1="100" x2="100" y2="40" style="stroke-width: 4px; stroke: #FFF;" id="minutehand">
															<animatetransform attributeName="transform"
																								attributeType="XML"
																								type="rotate"
																								dur="3600s"
																								repeatCount="indefinite"/>
													</line>
													<line x1="100" y1="100" x2="100" y2="30" style="stroke-width: 2px; stroke: #FFF;" id="secondhand">
															<animatetransform attributeName="transform"
																								attributeType="XML"
																								type="rotate"
																								dur="60s"
																								repeatCount="indefinite"/>
													</line>
											</g>
											<circle id="center" style="fill:#212121; stroke: #FFF; stroke-width: 2px;" cx="100" cy="100" r="3"></circle>
									</svg>
							</span>
							<h1 class="unselectable">Sergei Liski</h1>
							<p class="unselectable">Software Engineer</p>
						</header>
						<footer>

							<div class="footer-social-icons">
									<ul class="social-icons unselectable">
											<li><a href="https://www.facebook.com/sergeiliski" class="social-icon"> <i class="fa fa-facebook"></i></a></li>
											<li><a href="https://github.com/sergeiliski" class="social-icon"> <i class="fa fa-github"></i></a></li>
											<li><a href="https://www.linkedin.com/in/sergeiliski/" class="social-icon"> <i class="fa fa-linkedin"></i></a></li>
									</ul>
							</div>
						</footer>
					</section>
			</div>

		<!-- Scripts -->
			<script src="assets/lib/particlesjs/particles.min.js"></script>
			<script src="https://cdnjs.cloudflare.com/ajax/libs/riot/2.2.4/riot+compiler.min.js"></script>
			<!--[if lte IE 8]><script src="assets/js/respond.min.js"></script><![endif]-->
			<script>
				if ('addEventListener' in window) {
					window.addEventListener('load', function() { document.body.className = document.body.className.replace(/\bis-loading\b/, ''); });
					document.body.className += (navigator.userAgent.match(/(MSIE|rv:11\.0)/) ? ' is-ie' : '');
				}
				particlesJS.load('particles-js', 'assets/particles.json', function() {
					console.info('callback - particles.js config loaded');
				});

				var hands = [];
				hands.push(document.querySelector('#secondhand > *'));
				hands.push(document.querySelector('#minutehand > *'));
				hands.push(document.querySelector('#hourhand > *'));

				var cx = 100;
				var cy = 100;

				function shifter(val) {
					return [val, cx, cy].join(' ');
				}

				var date = new Date();
				var hoursAngle = 360 * date.getHours() / 12 + date.getMinutes() / 2;
				var minuteAngle = 360 * date.getMinutes() / 60;
				var secAngle = 360 * date.getSeconds() / 60;

				hands[0].setAttribute('from', shifter(secAngle));
				hands[0].setAttribute('to', shifter(secAngle + 360));
				hands[1].setAttribute('from', shifter(minuteAngle));
				hands[1].setAttribute('to', shifter(minuteAngle + 360));
				hands[2].setAttribute('from', shifter(hoursAngle));
				hands[2].setAttribute('to', shifter(hoursAngle + 360));

				for(var i = 1; i <= 12; i++) {
					var el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
					el.setAttribute('x1', '100');
					el.setAttribute('y1', '30');
					el.setAttribute('x2', '100');
					el.setAttribute('y2', '40');
					el.setAttribute('transform', 'rotate(' + (i*360/12) + ' 100 100)');
					el.setAttribute('style', 'stroke: #FFEB3B;');
					document.querySelector('svg').appendChild(el);
				}

			</script>

	</body>
</html>
